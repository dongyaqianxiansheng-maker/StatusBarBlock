plugins {
    id 'com.android.application'
}

android {
    namespace 'com.tool.statusbarblock'
    compileSdk 34

    defaultConfig {
        applicationId "com.tool.statusbarblock"
        minSdk 26
        targetSdk 27
        versionCode 1
        versionName "1.0"
    }

    buildTypes {
        debug {
            minifyEnabled false
        }
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }
}
